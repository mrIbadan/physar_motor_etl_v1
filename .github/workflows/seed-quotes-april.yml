name: Seed Supabase Quotes 

on:
  schedule:
    - cron: "*/10 6-18 * * *"
  workflow_dispatch:

jobs:
  run-seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # DEBUG STEP: This will print the files in your repo to the log
      # If you don't see 'requirements.txt' here, that's why it's failing
      - name: List files for debug
        run: ls -R

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Force install everything directly to bypass any file location issues
          pip install pandas numpy faker supabase python-dateutil
          # Also try the file if it exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOTAL_RECORDS: "50"
          BATCH_SIZE: "10"
        run: |
          python generate_quotes_april.py
