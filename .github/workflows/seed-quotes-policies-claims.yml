name: Seed Quotes, Policies, and Claims

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faker supabase python-dateutil

      - name: Debug - show script
        run: cat generate_quotes.py | head -40

      - name: Run quote generator
        run: python generate_quotes.py

  run-policies:
    runs-on: ubuntu-latest
    needs: run-quotes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase python-dateutil

      - name: Debug - show script
        run: cat generate_policies.py | head -40

      - name: Run policy generator
        run: python generate_policies.py

  run-claims:
    runs-on: ubuntu-latest
    needs: run-policies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Debug - show script
        run: cat generate_claims.py | head -60

      - name: Run claim generator
        run: python generate_claims.py
