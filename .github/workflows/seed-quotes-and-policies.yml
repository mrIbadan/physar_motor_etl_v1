name: Call main function in generate_quotes_april

on:
  workflow_dispatch:

jobs:
  seed_database:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Code
        uses: actions/checkout@v4

      - name: 2. Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy supabase faker

      - name: 4. Run Generator Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOTAL_RECORDS: 50
          BATCH_SIZE: 10
        run: python generate_quotes_april.py
