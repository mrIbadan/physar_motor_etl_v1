name: Seed Quotes  # Keep this simple

on:
  schedule:
    - cron: "*/10 6-18 * * *"
  workflow_dispatch:

jobs:
  run-seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOTAL_RECORDS: "50"
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas faker supabase python-dateutil
          python generate_quotes_april.py
