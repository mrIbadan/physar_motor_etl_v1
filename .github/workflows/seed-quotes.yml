name: Seed Supabase Quotes

on:
  schedule:
    - cron: "*/10 6-18 * * *"
  workflow_dispatch:

jobs:
  run-seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Force Install and Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOTAL_RECORDS: "50"
        run: |
          # 1. Force the install using the module path
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user numpy pandas faker supabase python-dateutil
          
          # 2. Add the user site-packages to the PATH just in case
          export PATH=$PATH:$(python3 -m site --user-base)/bin
          
          # 3. DIAGNOSTIC: Check if numpy is actually importable right now
          echo "--- Diagnostic Check ---"
          python3 -c "import numpy; print('Numpy Location:', numpy.__file__)" || echo "NUMPY STILL NOT FOUND"
          
          # 4. RUN: Use 'python3' explicitly
          python3 generate_quotes_april.py
