name: Seed Supabase Quotes

on:
  schedule:
    - cron: "*/10 6-18 * * *"
  workflow_dispatch:

jobs:
  run-seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # This helps with speed and consistency

      - name: Install and Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOTAL_RECORDS: "50"
          BATCH_SIZE: "10"
        run: |
          # 1. Upgrade pip
          python -m pip install --upgrade pip
          
          # 2. Force install everything using the python module 
          # This ensures numpy goes EXACTLY where python 3.11 is looking
          python -m pip install numpy pandas faker supabase python-dateutil
          
          # 3. Check if they actually installed (for the logs)
          python -c "import numpy; print('Numpy version:', numpy.__version__)"
          
          # 4. Run the script
          python generate_quotes_april.py
